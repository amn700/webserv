server {
  # listen 127.0.0.1:8080;
  listen 127.0.0.1:8084;
  # listen 127.255.255.2:8083;

  server_name site1.local;

  root ./www/site1;

  client_max_body_size 100000000;

  error_page 404 ./www/site1/errors/404.html;
  error_page 403 ./www/site1/errors/403.html;
  error_page 500 ./www/site1/errors/500.html;

  location / {
    index index.html;
    autoindex off;
  }

  location /assets {
    allowed_methods GET;
    root ./www/site1/static;
    autoindex off;
  }


  location /list {
    allowed_methods GET;
    root ./www/site1/public-list;
    autoindex on;
  }

  location /old/ {
  allowed_methods GET;
  return 301 /new/;
}

location /new {
  allowed_methods GET;
  root ./www/site1/pages;
  index new_page.html new.html;
  autoindex on;
}

  location /upload {
    allowed_methods GET POST;
    upload on;
    upload_dir ./www/site1/uploads;
  }

  location /uploads {
    allowed_methods GET DELETE;
    root ./www/site1;
    autoindex on;
  }

  location /cgi-bin {
    allowed_methods GET POST;
    root ./www/site1/cgi-bin/cgi-bin;
    cgi_ext .py /usr/bin/python3;
    cgi_ext .sh /bin/bash;
  }
}

server {
  listen 127.0.0.1:9090;

  server_name site2.local;

  root ./www/site2;
  client_max_body_size 200000;
    location / {
    index index.html;
    autoindex off;
  }

}
