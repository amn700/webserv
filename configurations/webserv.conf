server {
  # Parser torture-test: uncomment lines one-by-one.
  # Notes:
  # - Our parser accepts hostnames + IPv4, plus bracketed IPv6 ([addr]:port).
  # - Current runtime binding code resolves IPv4 only (AF_INET), so IPv6 examples
  #   are kept commented to avoid runtime failures.

  listen :8080;                # empty host -> 0.0.0.0
  listen *:8081;               # wildcard host -> 0.0.0.0
  listen localhost:8082;       # classic hostname
  listen LOCALHOST:8083;       # case-preserving hostname
  listen 127.0.0.1:8084;       # numeric IPv4
  listen 0.0.0.0:8085;         # all interfaces
  listen 127.0.0.1:65535;      # max port

  # DNS-ish / weird-but-parseable hostnames
  # listen example.com:8086;
  # listen a--b.example:8087;
  # listen xn--bcher-kva.example:8088;   # punycode form
  # listen this-is-a-very-long-hostname-label-to-stress-the-parser.example:8089;

  # Numeric edge cases (may fail bind at runtime)
  # listen 255.255.255.255:8090;         # broadcast
  # listen 127.000.000.001:8091;         # leading zeros
  # listen 0.0.0.0:0;                    # ephemeral port (valid parse)

  # IPv6 forms (parseable; runtime AF_INET resolver will reject)
  # listen [::1]:8092;
  # listen [2001:db8::1]:8093;
  # listen [::ffff:127.0.0.1]:8094;      # v4-mapped
  # listen [fe80::1%lo]:8095;            # zone id (Linux-style)

  # Negative tests (should throw parse errors when uncommented)
  # listen 127.0.0.1:65536;
  # listen missing-colon;
#   listen 127.0.0.1:9080;
#   listen 127.0.0.1:7080;
#   listen 127.0.0.1:6080;
#   listen 127.0.0.1:5080;

