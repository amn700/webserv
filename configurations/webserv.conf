server {
  listen localhost:8080;
  # listen localhost:8080;
  # listen 127.0.0.1:8084;
  # listen 127.255.255.2:8083;
  # server_name site1.local;

  root ./www;

  client_max_body_size 1000000;

  error_page 404 ./www/site1/errors/404.html;
  error_page 405 ./www/site1/errors/405.html;
  error_page 413 ./www/site1/errors/413.html;
  error_page 500 ./www/site1/errors/500.html;

  location / {
    allowed_methods GET;
    index index2.html;
    autoindex off;
  }

  location /assets/ {
    allowed_methods GET;
    root ./www/site1/static;
    autoindex off;
  }


  location /list/ {
    allowed_methods GET;
    root ./www/site1/public-list;
    autoindex on;
  }

  location /old {
    allowed_methods GET;
    return 301 /new;
  }

  location /new {
    allowed_methods GET;
    root ./www/site1/pages;
    index new.html;
    autoindex off;
  }

  location /upload/ {
    allowed_methods POST;
    upload on;
    upload_dir ./www/site1/uploads;
  }

  location /cgi-bin/ {
    allowed_methods GET POST;
    root ./www/site1/cgi-bin;
    cgi_ext .py /usr/bin/python3;
  }
}

